<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IELTS Prep — Bepul IELTS Tayyorgarlik Platformasi</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">

  <!-- SHU YERNI O'CHIRING: Supabase CDN bu yerdan yo'q -->
</head>
<body>

  <!-- JS ishlayotgunga qadar ko'rinadigan loading -->
  <div id="initial-loader" style="display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:16px;font-family:'Outfit',sans-serif;">
    <i class="fa-solid fa-spinner fa-spin" style="font-size:40px;color:#0D7377;"></i>
    <p style="color:#6B7280;font-size:16px;">Yuklanmoqda...</p>
  </div>

  <div id="app" style="display:none;"></div>
  <div id="modal-container"></div>
  <div id="toast-container"></div>

  <!-- JS fayllari -->
  <script src="js/config.js"></script>
  <script src="js/db.js"></script>
  <script src="js/band-score.js"></script>
  <script src="js/sample-data.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/pages.js"></script>
  <script src="js/test-engine.js"></script>
  <script src="js/app.js"></script>
  <script src="js/admin-builder.js"></script>

  <!-- Supabase ni faqat kerak bo'lganda yuklash -->
  <script>
    // Agar Supabase enabled bo'lsa, skriptni dinamik yuklaymiz
    if (SUPABASE_CONFIG && SUPABASE_CONFIG.enabled) {
      var s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2';
      s.async = true;
      s.onload = function() {
        // Supabase yuklandi, client ni yaratish
        if (typeof window.supabase !== 'undefined') {
          try {
            supabaseClient = window.supabase.createClient(
              SUPABASE_CONFIG.url,
              SUPABASE_CONFIG.anonKey
            );
            console.log('Supabase ulandi');
          } catch(e) {
            console.error('Supabase xato:', e);
            SUPABASE_CONFIG.enabled = false;
          }
        }
      };
      s.onerror = function() {
        console.error('Supabase CDN yuklanmadi, localStorage ishlatiladi');
        SUPABASE_CONFIG.enabled = false;
      };
      document.head.appendChild(s);
    }
  </script>

  <!-- Xatolikni ushlash — agar JS xato bersa, ekranda ko'rsatamiz -->
  <script>
    window.onerror = function(msg, url, line, col, error) {
      var loader = document.getElementById('initial-loader');
      var app = document.getElementById('app');
      if (loader) loader.style.display = 'none';
      if (app) {
        app.style.display = 'block';
        app.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;padding:40px;">' +
          '<div style="text-align:center;max-width:500px;">' +
          '<i class="fa-solid fa-triangle-exclamation" style="font-size:48px;color:#DC2626;margin-bottom:16px;display:block;"></i>' +
          '<h2 style="margin-bottom:8px;">JavaScript xatolik</h2>' +
          '<p style="color:#6B7280;margin-bottom:16px;">Qator ' + line + ': ' + msg + '</p>' +
          '<button class="btn btn-primary" onclick="location.reload()" style="display:inline-flex;align-items:center;gap:8px;padding:12px 24px;border-radius:8px;background:#0D7377;color:#fff;border:none;font-weight:600;cursor:pointer;font-size:15px;">' +
          '<i class="fa-solid fa-rotate-right"></i> Qayta yuklash</button>' +
          '</div></div>';
      }
      return false;
    };
  </script>
</body>
</html>
